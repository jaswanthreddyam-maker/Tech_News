name: Code Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-lint:
    name: Ruff Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install ruff
      - run: ruff check .
        working-directory: backend

  python-types:
    name: MyPy Type Check
    runs-on: ubuntu-latest
    needs: python-lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt mypy
        working-directory: backend
      - run: mypy .
        working-directory: backend

  schema-migrations:
    name: Alembic + Schema Drift
    runs-on: ubuntu-latest
    needs: python-lint
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres_ci_pass@localhost:5432/tech_news_test
      REDIS_URL: redis://localhost:6379/0
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      ENV: test
      PYTHONPATH: .
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_ci_pass
          POSTGRES_DB: tech_news_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tech_news_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client
      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: backend
      - name: Apply migrations
        run: alembic upgrade head
        working-directory: backend
      - name: Check SQLAlchemy model drift
        run: alembic check
        working-directory: backend
      - name: Verify generated schema.sql
        run: python scripts/generate_schema.py --verify
        working-directory: backend

  frontend-lint:
    name: ESLint + TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npx next lint
        working-directory: frontend
      - run: npx tsc --noEmit
        working-directory: frontend
