name: Docker

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKER_BUILDKIT: "1"
  COMPOSE_DOCKER_CLI_BUILD: "1"

jobs:
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create environment file
        run: cp .env.example .env

      - name: Validate Compose configuration
        run: docker compose config --quiet

      - name: Build all images
        run: docker compose build --pull

      - name: List built images
        run: docker compose images

      - name: Verify backend image
        run: docker image inspect tech-news-backend

      - name: Verify worker image
        run: docker image inspect tech-news-worker

      - name: Verify beat image
        run: docker image inspect tech-news-beat

      - name: Verify frontend image
        run: docker image inspect tech-news-frontend
