name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql+asyncpg://postgres:postgres_ci_pass@localhost:5432/tech_news_test
  REDIS_URL: redis://localhost:6379/0
  REDIS_HOST: localhost
  REDIS_PORT: "6379"
  ENV: test
  PYTHONPATH: .

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_ci_pass
          POSTGRES_DB: tech_news_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tech_news_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-backend-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            pip-backend-

      - name: Install dependencies
        run: pip install -r requirements.txt pytest-cov

      - name: Initialize database
        run: python -m app.core.init_db

      - name: Run pytest with coverage
        run: >
          pytest
          -ra
          --maxfail=1
          --cov=app
          --cov-report=xml:coverage.xml
          --cov-report=html:htmlcov

      - name: Upload coverage XML
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-xml
          path: backend/coverage.xml
          retention-days: 14

      - name: Upload coverage HTML
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-html
          path: backend/htmlcov/
          retention-days: 14

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: frontend

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_ci_pass
          POSTGRES_DB: tech_news_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tech_news_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-backend-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            pip-backend-

      - name: Install backend dependencies
        run: pip install -r requirements.txt
        working-directory: backend

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Initialize database
        run: python -m app.core.init_db
        working-directory: backend

      - name: Ensure test admin user
        run: >
          python scripts/manage_test_user.py ensure
          test_admin_playwright@example.com
          test_password_secure_123!
          super_admin
        working-directory: backend

      - name: Start backend server
        run: python -m uvicorn main:app --host 0.0.0.0 --port 8000 &
        working-directory: backend

      - name: Wait for backend readiness
        run: |
          echo "Waiting for backend /health/ready..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/api/v1/health/ready > /dev/null 2>&1; then
              echo "Backend is ready (attempt $i)"
              exit 0
            fi
            sleep 2
          done
          echo "Backend failed to become ready within 60 seconds"
          exit 1
        working-directory: .

      - name: Run Playwright smoke tests
        run: npx playwright test --grep @smoke

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-playwright-report
          path: frontend/playwright-report/
          retention-days: 14

      - name: Upload Playwright test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: frontend/test-results/
          retention-days: 14
