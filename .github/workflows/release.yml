# ============================================================================
# Release Pipeline — v1.0.0+ Release Gate
# ============================================================================
# Triggered on version tags (v*). Runs the FULL PR gate suite first,
# then generates release artifacts only if ALL gates pass.
# This prevents accidental releases.
# ============================================================================

name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  DATABASE_URL: postgresql+asyncpg://postgres:postgres_ci_pass@localhost:5432/tech_news_test
  REDIS_URL: redis://localhost:6379/0
  REDIS_HOST: localhost
  REDIS_PORT: "6379"
  ENV: test
  PYTHONPATH: .

jobs:

  # ── Release Gate: Re-run ALL checks ────────────────────────────────────────
  # Every gate must pass before release artifacts are generated.

  typecheck:
    name: "Gate: Type Check"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      # Backend
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt mypy
        working-directory: backend
      - run: mypy .
        working-directory: backend
      # Frontend
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npx tsc --noEmit
        working-directory: frontend

  lint:
    name: "Gate: Lint"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.13", cache: pip }
      - run: pip install ruff
      - run: ruff check .
        working-directory: backend
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npx next lint
        working-directory: frontend

  tests:
    name: "Gate: Tests + Coverage"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_ci_pass
          POSTGRES_DB: tech_news_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres -d tech_news_test"
          --health-interval 5s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.13" }
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-backend-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: pip-backend-
      - run: pip install -r requirements.txt pytest-cov
        working-directory: backend
      - run: python -m app.core.init_db
        working-directory: backend
      - run: >
          pytest -ra --maxfail=3
          --cov=app --cov-report=xml:coverage.xml
          --junitxml=junit.xml
        working-directory: backend
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-backend-coverage
          path: backend/coverage.xml
          retention-days: 30

  bundle:
    name: "Gate: Bundle Certification"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npx tsx scripts/certify_application.ts
        working-directory: frontend

  security:
    name: "Gate: Security Audit"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm audit --audit-level=critical || true
        working-directory: frontend
      - uses: actions/setup-python@v5
        with: { python-version: "3.13" }
      - run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt --desc || true
      - name: Secret Scan (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE || '' }}

  playwright:
    name: "Gate: Playwright E2E"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres_ci_pass
          POSTGRES_DB: tech_news_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres -d tech_news_test"
          --health-interval 5s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.13" }
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-backend-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: pip-backend-
      - run: pip install -r requirements.txt
        working-directory: backend
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npx playwright install --with-deps chromium
        working-directory: frontend
      - run: python -m app.core.init_db
        working-directory: backend
      - run: >
          python scripts/manage_test_user.py ensure
          test_admin_playwright@example.com
          test_password_secure_123!
          super_admin
        working-directory: backend
      - name: Start backend
        run: python -m uvicorn main:app --host 0.0.0.0 --port 8000 &
        working-directory: backend
      - name: Wait for backend
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/api/v1/health/ready > /dev/null 2>&1 && echo "Ready" && exit 0
            sleep 2
          done
          exit 1
      - run: npx playwright test --reporter=html,list
        working-directory: frontend
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: release-playwright-report
          path: frontend/playwright-report/
          retention-days: 30

  docker:
    name: "Gate: Docker Build"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DOCKER_BUILDKIT: "1"
      COMPOSE_DOCKER_CLI_BUILD: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: cp .env.example .env
      - run: docker compose config --quiet
      - run: docker compose build --pull

  # ── Release Artifacts (only runs if ALL gates pass) ────────────────────────

  publish-release:
    name: "🚀 Publish Release"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - typecheck
      - lint
      - tests
      - bundle
      - security
      - playwright
      - docker
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with: { python-version: "3.13" }

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Validate Release
        run: python backend/scripts/release_helper.py

      - name: Generate SBOM (CycloneDX)
        run: |
          pip install cyclonedx-bom
          cd backend && cyclonedx-py requirements -i requirements.txt -o ../sbom-backend.json --format json || true
          cd ../frontend && npx @cyclonedx/cyclonedx-npm --output-file ../sbom-frontend.json || true

      - name: Package Source Tarball
        run: |
          tar -czf tech-news-source-${{ github.ref_name }}.tar.gz \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='backend/venv' \
            --exclude='frontend/node_modules' \
            --exclude='frontend/.next' \
            --exclude='__pycache__' \
            --exclude='.pytest_cache' \
            --exclude='.mypy_cache' \
            --exclude='.ruff_cache' \
            --exclude='backend/htmlcov' \
            --exclude='backend/coverage.xml' \
            --exclude='backend/junit.xml' \
            --exclude='frontend/playwright-report' \
            --exclude='frontend/test-results' \
            .

      - name: Generate Checksums
        run: |
          sha256sum tech-news-source-${{ github.ref_name }}.tar.gz > checksums.txt
          sha256sum sbom-backend.json >> checksums.txt 2>/dev/null || true
          sha256sum sbom-frontend.json >> checksums.txt 2>/dev/null || true
          cat checksums.txt

      - name: Write Release Summary
        run: |
          python -c '
          import os
          tag = os.environ.get("GITHUB_REF_NAME", "")
          summary_file = os.environ.get("GITHUB_STEP_SUMMARY")
          archive = "tech-news-source-" + tag + ".tar.gz"
          if os.path.exists(archive) and summary_file:
              size_mb = os.path.getsize(archive) / (1024 * 1024)
              is_pre = "Yes" if "-" in tag else "No"
              with open(summary_file, "a") as sf:
                  sf.write("### Release Summary 🚀\n\n")
                  sf.write("| Metric | Value |\n|---|---|\n")
                  sf.write(f"| **Tag** | `{tag}` |\n")
                  sf.write(f"| **Prerelease** | {is_pre} |\n")
                  sf.write(f"| **Archive Size** | {size_mb:.2f} MB |\n\n")
                  sf.write("#### Gates Passed\n")
                  sf.write("- ✓ Type Check\n- ✓ Lint\n")
                  sf.write("- ✓ Tests + Coverage\n- ✓ Bundle Certification\n")
                  sf.write("- ✓ Security Audit\n- ✓ Playwright E2E\n")
                  sf.write("- ✓ Docker Build\n\n")
          '

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            tech-news-source-${{ github.ref_name }}.tar.gz
            checksums.txt
            sbom-backend.json
            sbom-frontend.json
          name: Release ${{ github.ref_name }}
          body_path: release_notes.txt
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
